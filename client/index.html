<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Meet Arya — your AI fitness coach built for India. Track meals, build smarter workouts, understand your nutrition with an AI that knows Indian food." />
    <meta name="theme-color" content="#F97316" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <title>FitFlow | AI Fitness Coach</title>
    <!-- Prevent FOUC for theme -->
    <script>
      (function() {
        try {
          var t = localStorage.getItem('fitflow_theme');
          if (!t) {
            t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          document.documentElement.setAttribute('data-theme', t);
        } catch (e) {}
      })();
    </script>
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
