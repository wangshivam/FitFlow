# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Render Blueprint – FitFlow Backend
# https://render.com/docs/blueprint-spec
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

databases:
  - name: fitflow-db
    plan: free
    databaseName: fitflow
    user: fitflow_user

services:
  - type: web
    name: fitflow-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install && npx knex migrate:latest
    startCommand: node src/app.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: fitflow-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: JWT_REFRESH_EXPIRES_IN
        value: 30d
      - key: GROQ_API_KEY
        sync: false  # Set manually in Render dashboard
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: CLIENT_URL
        sync: false  # Set to your deployed frontend URL
